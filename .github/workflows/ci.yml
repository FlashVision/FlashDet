name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: 1
  PIP_DISABLE_PIP_VERSION_CHECK: 1

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Stage 1: Fast checks — lint + smoke tests (< 2 min)
  # ──────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check flashdet/ --output-format=github

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: pip install -e ".[dev,tracker,solutions]"

      - name: Run smoke tests
        run: pytest tests/smoke/ -m smoke -v --timeout=30

      - name: CLI health check
        run: |
          flashdet version
          flashdet check

  # ──────────────────────────────────────────────────────────────────
  # Stage 2: Unit tests — all architectures, all modules
  # ──────────────────────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev,tracker,solutions,analytics]"
          pip install pytest-timeout pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --timeout=120 \
            --cov=flashdet \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -x

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────────────────────────
  # Stage 3: Integration tests — pipelines, CLI, export
  # ──────────────────────────────────────────────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev,all]"
          pip install pytest-timeout

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --timeout=300 \
            --runslow \
            -x

  # ──────────────────────────────────────────────────────────────────
  # Stage 4: Architecture-specific model tests
  # ──────────────────────────────────────────────────────────────────
  model-tests:
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        arch: [flashdet, yolov8, yolov9, yolov10, yolov11, yolox]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev,tracker]"

      - name: Test ${{ matrix.arch }} architecture
        run: |
          pytest tests/unit/models/test_architectures.py \
            -v \
            --timeout=120 \
            -k "${{ matrix.arch }}"

  # ──────────────────────────────────────────────────────────────────
  # Stage 5: Build verification
  # ──────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify wheel installs
        run: |
          pip install dist/*.whl
          python -c "import flashdet; print(f'flashdet v{flashdet.__version__}')"
          flashdet check

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
