# FlashDet-m-1.5x | 320px | COCO
# Params: ~2.44M | FP16: ~5.2 MB | Best accuracy
# Usage: flashdet train --config configs/flashdet_m15x_320_coco.yaml

model:
  name: FlashDet
  backbone: ShuffleNetV2
  backbone_size: "1.5x"
  fpn_channels: 128
  input_size: [320, 320]
  num_classes: 80
  reg_max: 7
  strides: [8, 16, 32, 64]

data:
  train_images: data/coco/train2017
  train_annotations: data/coco/annotations/instances_train2017.json
  val_images: data/coco/val2017
  val_annotations: data/coco/annotations/instances_val2017.json
  num_workers: 8

train:
  epochs: 300
  batch_size: 96
  learning_rate: 0.001
  weight_decay: 0.05
  warmup_epochs: 5
  grad_clip: 35.0
  val_interval: 10
  save_dir: workspace/flashdet_m15x_320_coco

augment:
  scale: [0.6, 1.4]
  flip_prob: 0.5
  brightness: 0.2
  contrast: [0.6, 1.4]
  saturation: [0.5, 1.2]
