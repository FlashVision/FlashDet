# FlashDet-m-0.5x | 320px | Knowledge Distillation
# Train small student (m-0.5x) from larger teacher (m-1.5x)
# Usage: flashdet train --config configs/flashdet_m_320_kd.yaml

model:
  name: FlashDet
  backbone: ShuffleNetV2
  backbone_size: "0.5x"
  fpn_channels: 96
  input_size: [320, 320]
  num_classes: 80
  reg_max: 7
  strides: [8, 16, 32, 64]

data:
  train_images: data/coco/train2017
  train_annotations: data/coco/annotations/instances_train2017.json
  val_images: data/coco/val2017
  val_annotations: data/coco/annotations/instances_val2017.json
  num_workers: 8

train:
  epochs: 300
  batch_size: 96
  learning_rate: 0.001
  weight_decay: 0.05
  warmup_epochs: 5
  grad_clip: 35.0
  val_interval: 10
  save_dir: workspace/flashdet_kd

  # Knowledge Distillation
  use_kd: true
  kd_teacher_checkpoint: workspace/flashdet_m15x_320_coco/best.pth
  kd_teacher_model_size: "m-1.5x"
  kd_temperature: 4.0
  kd_logit_weight: 1.0
  kd_feature_weight: 0.5
  kd_hard_loss_weight: 1.0

augment:
  scale: [0.6, 1.4]
  flip_prob: 0.5
