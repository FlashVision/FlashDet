# FlashDet-m | 320px | LoRA Fine-tuning
# Fine-tune with pretrained COCO weights using LoRA
# Only ~5% of parameters trained, much faster convergence
# Usage: flashdet train --config configs/flashdet_m_320_lora.yaml

model:
  name: FlashDet
  backbone: ShuffleNetV2
  backbone_size: "1.0x"
  fpn_channels: 96
  input_size: [320, 320]
  num_classes: 10  # change to your dataset
  reg_max: 7
  strides: [8, 16, 32, 64]

data:
  train_images: data/custom/train
  train_annotations: data/custom/train/_annotations.coco.json
  val_images: data/custom/val
  val_annotations: data/custom/val/_annotations.coco.json
  num_workers: 4

train:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.05
  warmup_epochs: 3
  grad_clip: 35.0
  val_interval: 5
  save_dir: workspace/flashdet_lora
  pretrained_coco: true

  # LoRA settings
  use_lora: true
  lora_rank: 8
  lora_alpha: 16.0
  lora_dropout: 0.05
  lora_target_modules: ["backbone", "fpn"]
  lora_variant: dora  # standard, dora, lora_plus, adalora, ortho, lora_fa

augment:
  scale: [0.6, 1.4]
  flip_prob: 0.5
  brightness: 0.2
