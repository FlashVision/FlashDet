# YOLOv10-S training config (COCO, 640px)
model:
  architecture: yolov10
  num_classes: 80
  input_size: [640, 640]
  width_mult: 0.5
  depth_mult: 0.5
  reg_max: 16
  use_psa: true

data:
  train_images: "data/coco/train2017"
  train_annotations: "data/coco/annotations/instances_train2017.json"
  val_images: "data/coco/val2017"
  val_annotations: "data/coco/annotations/instances_val2017.json"
  num_workers: 8

train:
  epochs: 300
  batch_size: 32
  learning_rate: 0.01
  weight_decay: 0.0005
  warmup_epochs: 3
  val_interval: 5
  save_dir: "workspace/yolov10_s_coco"
  amp: true

augment:
  scale: [0.5, 1.5]
  flip_prob: 0.5
